---
apiVersion: v1
kind: Service
metadata:
  labels:
    {{- include "apl.labels" . | nindent 4 }}
    gateway.istio.io/managed: istio.io-gateway-controller
    gateway.networking.k8s.io/gateway-class-name: istio
    gateway.networking.k8s.io/gateway-name: platform
  name: platform-istio
  namespace: istio-system
spec:
  type: LoadBalancer
  ports:
  - appProtocol: tcp
    name: status-port
    port: 15021
    protocol: TCP
    targetPort: 15021
  - appProtocol: http
    name: http
    port: 80
    protocol: TCP
    targetPort: 80
  - appProtocol: https
    name: https
    port: 443
    protocol: TCP
    targetPort: 443
  selector:
    gateway.networking.k8s.io/gateway-name: platform
