name: Release from Branch

on:
  workflow_dispatch:
    inputs:
      is_prerelease:
        description: 'Pre-release — cuts RC tag (false strips RC suffix and cuts stable tag)'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      dry_run:
        description: 'Dry run — skip all writes (tag, release, Docker push, Helm)'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  RELEASE_BRANCH: ${{ github.ref_name }}
  REPO: ghcr.io/linode/apl-core-tests
  LOCAL_CACHE_IMAGE: apl-core-tests:ci-build
  BOT_EMAIL: ${{ vars.BOT_EMAIL }}
  BOT_USERNAME: ${{ vars.BOT_USERNAME }}
  DOCKER_USERNAME: linode
  DOCKER_PASSWORD: ${{secrets.GITHUB_TOKEN}}

jobs: 
  release-from-branch:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_BRANCH }}
          fetch-depth: 0
          token: ${{secrets.GITHUB_TOKEN}}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: ci/.nvmrc

      - name: Install CI dependencies
        working-directory: ci
        run: npm ci

      - name: Validate release branch
        run: |
          if [[ "$RELEASE_BRANCH" != releases/* ]]; then
            echo "::error::release_from_branch may only run on releases/* branches. Got: $RELEASE_BRANCH"
            exit 1
          fi

      - name: Check versions.yaml entries are semver-compatible
        working-directory: ci
        run: npm run release:check-versions-yaml
        env:
          REPO_ROOT: ${{ github.workspace }}
          IS_PRERELEASE: ${{ inputs.is_prerelease }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute release tag
        id: compute-tag
        working-directory: ci
        run: npm run release:compute-tag
        env:
          IS_PRERELEASE: ${{ inputs.is_prerelease }}

      - name: Check tag does not already exist
        working-directory: ci
        run: npm run release:check-tag-not-exists
        env:
          RELEASE_TAG: ${{ steps.compute-tag.outputs.tag }}

      - name: Prepare Helm chart
        if: ${{ inputs.dry_run == 'false' }}
        run: ci/scripts/prepare_chart_for_release.sh
        env:
          CHART_PATH: chart/apl-test
          RELEASE_TAG: ${{ steps.compute-tag.outputs.tag }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Run tests in Docker (test gate)
        uses: docker/build-push-action@v7
        with:
          push: false
          load: true
          context: .
          build-args: |
            SKIP_TESTS=false
            VERSION=${{ steps.compute-tag.outputs.tag }}
          tags: ${{ env.LOCAL_CACHE_IMAGE }}

      - name: Configure git bot identity
        working-directory: ci
        run: npm run release:configure-git

      - name: Create and push git tag
        working-directory: ci
        run: npm run release:tag-release
        env:
          RELEASE_TAG: ${{ steps.compute-tag.outputs.tag }}
          DRY_RUN: ${{ inputs.dry_run }}

      # - name: Login to Docker Hub
      #   if: ${{ inputs.dry_run == 'false' }}
      #   uses: docker/login-action@v4
      #   with:
      #     username: ${{ env.DOCKER_USERNAME }}
      #     password: ${{ env.DOCKER_PASSWORD }}

      # - name: Push Docker image with release tag
      #   working-directory: ci
      #   run: npm run release:docker-push
      #   env:
      #     RELEASE_TAG: ${{ steps.compute-tag.outputs.tag }}
      #     CACHE_IMAGE: ${{ env.LOCAL_CACHE_IMAGE }}
      #     DOCKER_REPO: ${{ env.REPO }}
      #     DRY_RUN: ${{ inputs.dry_run }}

      - name: Publish Helm chart
        if: ${{ inputs.dry_run == 'false' }}
        uses: helm/chart-releaser-action@v1.7.0
        with:
          charts_dir: chart
          skip_existing: true
          mark_as_latest: false
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        working-directory: ci
        run: npm run release:create-github-release
        env:
          RELEASE_TAG: ${{ steps.compute-tag.outputs.tag }}
          IS_PRERELEASE: ${{ inputs.is_prerelease }}
          DRY_RUN: ${{ inputs.dry_run }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}