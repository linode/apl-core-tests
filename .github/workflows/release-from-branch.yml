name: Release from Branch

on:
  workflow_dispatch:
    inputs:
      is_prerelease:
        description: 'Pre-release — cuts RC tag (false strips RC suffix and cuts stable tag)'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      dry_run:
        description: 'Dry run — skip all writes (tag, release, Docker push, Helm)'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  release-from-branch:
    permissions:
      contents: write
      pull-requests: write
    uses: ./.github/workflows/release-tag-from-branch.yml
    with:
      release_branch: ${{ github.ref_name }}
      is_prerelease: ${{ inputs.is_prerelease == 'true' }}
      dry_run: ${{ inputs.dry_run == 'true' }}

  release-chart:
    needs: release-from-branch
    permissions:
      contents: write
    uses: ./.github/workflows/release-chart-from-tag.yml
    with:
      release_tag: ${{ needs.release-from-branch.outputs.release_tag }}
      dry_run: ${{ inputs.dry_run == 'true' }}