name: Release from Branch

on:
  workflow_dispatch:
    inputs:
      is_prerelease:
        description: 'Pre-release — cuts RC tag (false strips RC suffix and cuts stable tag)'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      dry_run:
        description: 'Dry run — skip all writes (tag, release, Docker push, Helm)'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  release-get-tag:
    permissions:
      contents: read
    uses: ./.github/workflows/release-get-tag.yml
    with:
      release_branch: ${{ github.ref_name }}
      is_prerelease: ${{ inputs.is_prerelease == 'true' }}

  validate-deps:
    needs: release-get-tag
    permissions:
      contents: read
    uses: ./.github/workflows/validate-deps.yml
    with:
      release_branch: ${{ github.ref_name }}
      is_prerelease: ${{ inputs.is_prerelease == 'true' }}

  release-from-branch:
    needs:
      - release-get-tag
      - validate-deps
    permissions:
      contents: write
    uses: ./.github/workflows/release-software.yml
    with:
      release_branch: ${{ github.ref_name }}
      release_tag: ${{ needs.release-get-tag.outputs.release_tag }}
      is_prerelease: ${{ inputs.is_prerelease == 'true' }}
      dry_run: ${{ inputs.dry_run == 'true' }}
      container_registry: 'ghcr.io/linode/apl-core-tests'
      oci_username: 'linode'
    secrets:
      oci_password: ${{ secrets.DOCKER_PASSWORD }}
  release-helm-chart:
    needs:
      - release-get-tag
      - release-from-branch
    permissions:
      contents: write
    uses: ./.github/workflows/release-helm-chart.yml
    with:
      release_tag: ${{ needs.release-get-tag.outputs.release_tag }}
      dry_run: ${{ inputs.dry_run == 'true' }}