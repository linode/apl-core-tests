name: Release Tag from Branch

on:
  workflow_call:
    inputs:
      is_prerelease:
        description: 'Cut an RC tag instead of a stable tag'
        required: true
        type: boolean
      dry_run:
        description: 'Skip all writes (tag, release, and Docker push)'
        required: true
        type: boolean
      release_branch:
        description: 'Release branch to tag'
        required: true
        type: string
      release_branch_prefix:
        description: 'Prefix required for release branches'
        required: false
        default: 'releases/'
        type: string
      release_tag_prefix:
        description: 'Prefix to add to release tags'
        required: false
        default: 'v'
        type: string
      container_registry:
        description: 'Container repository to push release images to'
        required: true
        type: string
      oci_username:
        description: 'Username used to authenticate to the container registry'
        required: true
        type: string
    secrets:
      oci_password:
        description: 'Password or token used to authenticate to the container registry'
        required: true

    outputs:
      release_tag:
        description: 'Computed release tag'
        value: ${{ jobs.release-software.outputs.release_tag }}

env:
  RELEASE_BRANCH: ${{ inputs.release_branch }}
  RELEASE_BRANCH_PREFIX: ${{ inputs.release_branch_prefix }}
  RELEASE_TAG_PREFIX: ${{ inputs.release_tag_prefix }}
  CONTAINER_REGISTRY: ${{ inputs.container_registry }}
  OCI_USERNAME: ${{ inputs.oci_username }}
  OCI_PASSWORD: ${{ secrets.oci_password }}
  LOCAL_CACHE_IMAGE: cache:ci-build

jobs:
  release-software:
    runs-on: ubuntu-22.04
    outputs:
      release_tag: ${{ steps.compute-tag.outputs.tag }}
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_BRANCH }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: ci/.nvmrc

      - name: Install CI dependencies
        working-directory: ci
        run: npm ci

      - name: Validate release branch
        run: |
          if [[ "$RELEASE_BRANCH" != $RELEASE_BRANCH_PREFIX* ]]; then
            echo "::error::release_from_branch may only run on $RELEASE_BRANCH_PREFIX* branches. Got: $RELEASE_BRANCH"
            exit 1
          fi

      - name: Compute release tag
        id: compute-tag
        working-directory: ci
        run: npm run release:compute-tag
        env:
          IS_PRERELEASE: ${{ inputs.is_prerelease }}

      - name: Check tag does not already exist
        working-directory: ci
        run: npm run release:check-tag-not-exists
        env:
          RELEASE_TAG: ${{ steps.compute-tag.outputs.tag }}

      - name: Check versions.yaml entries are semver-compatible
        working-directory: ci
        run: npm run release:check-versions-yaml
        env:
          REPO_ROOT: ${{ github.workspace }}
          IS_PRERELEASE: ${{ inputs.is_prerelease }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Ensure the image builds before creating a release tag.
      - name: Run tests in Docker (test gate)
        uses: docker/build-push-action@v7
        with:
          push: false
          load: true
          context: .
          build-args: |
            SKIP_TESTS=false
            VERSION=${{ steps.compute-tag.outputs.tag }}
          tags: ${{ env.LOCAL_CACHE_IMAGE }}

      - name: Configure git identity
        env:
          ACTOR_ID: ${{ github.actor_id }}
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "${ACTOR_ID}+${GITHUB_ACTOR}@users.noreply.github.com"

      - name: Create and push git tag
        working-directory: ci
        run: npm run release:tag-release
        env:
          RELEASE_TAG: ${{ steps.compute-tag.outputs.tag }}
          DRY_RUN: ${{ inputs.dry_run }}

      # - name: Login to Docker Hub
      #   if: ${{ !inputs.dry_run }}
      #   uses: docker/login-action@v4
      #   with:
      #     username: ${{ env.OCI_USERNAME }}
      #     password: ${{ env.OCI_PASSWORD }}

      # - name: Push Docker image with release tag
      #   working-directory: ci
      #   run: npm run release:docker-push
      #   env:
      #     RELEASE_TAG: ${{ steps.compute-tag.outputs.tag }}
      #     CACHE_IMAGE: ${{ env.LOCAL_CACHE_IMAGE }}
      #     DOCKER_REPO: ${{ env.CONTAINER_REGISTRY }}
      #     DRY_RUN: ${{ inputs.dry_run }}

      - name: Create GitHub Release
        working-directory: ci
        run: npm run release:create-github-release
        env:
          RELEASE_TAG: ${{ steps.compute-tag.outputs.tag }}
          IS_PRERELEASE: ${{ inputs.is_prerelease }}
          DRY_RUN: ${{ inputs.dry_run }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}